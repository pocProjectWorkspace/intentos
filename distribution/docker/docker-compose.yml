version: "3.8"
services:
  intentos:
    build: ../..
    dockerfile: distribution/docker/Dockerfile
    ports:
      - "7891:7891"
    volumes:
      - intentos-data:/home/intentos/.intentos
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  intentos-data:
  ollama-data:
